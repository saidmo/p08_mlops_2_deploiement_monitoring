<svg width="900" height="880" viewBox="0 0 900 880" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title    { font: 700 26px 'Liberation Sans', Arial, sans-serif; fill: #2C2C2A; }
    .subtitle { font: 400 14px 'Liberation Sans', Arial, sans-serif; fill: #5F5E5A; }
    .bt       { font: 700 16px 'Liberation Sans', Arial, sans-serif; }
    .bs       { font: 400 13px 'Liberation Sans', Arial, sans-serif; }
    .ct-h     { font: 700 16px 'Liberation Sans', Arial, sans-serif; fill: #0C447C; }
    .brt      { font: 700 14px 'Liberation Sans', Arial, sans-serif; }
    .brl      { font: 400 12px 'Liberation Sans', Arial, sans-serif; }
    .brr      { font: 700 12px 'Liberation Sans', Arial, sans-serif; }
    .badge    { font: 700 11px 'Liberation Sans', Arial, sans-serif; fill: #27500A; }
    .dim      { font: 700 12px 'Liberation Sans', Arial, sans-serif; fill: #5F5E5A; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="880" fill="#FFFFFF"/>

  <text class="title" x="450" y="42" text-anchor="middle">Pipeline de scoring crédit</text>
  <text class="subtitle" x="450" y="66" text-anchor="middle">De l'entrée d'un client à la décision d'octroi — P08</text>

  <!-- 1. Entrée client -->
  <rect x="230" y="90" width="440" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="bt" x="450" y="115" text-anchor="middle" fill="#2C2C2A">Entrée client (dict)</text>
  <text class="bs" x="450" y="134" text-anchor="middle" fill="#5F5E5A">~20 features du noyau (le reste absent) ou client complet</text>
  <line x1="450" y1="146" x2="450" y2="167" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. _to_frame (optimisé) -->
  <rect x="230" y="168" width="440" height="64" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <rect x="556" y="176" width="104" height="20" rx="10" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="badge" x="608" y="190" text-anchor="middle">OPTIMISÉ — Étape 4</text>
  <text class="bt" x="248" y="200" fill="#27500A">_to_frame — copie du template pré-alloué</text>
  <text class="bs" x="248" y="220" fill="#3B6D11">DataFrame d'1 ligne aligné sur 658 colonnes (NaN pour les absentes)</text>
  <text class="dim" x="690" y="205" text-anchor="start">658</text>
  <line x1="450" y1="232" x2="450" y2="253" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. FunctionTransformer -->
  <rect x="230" y="254" width="440" height="64" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="bt" x="450" y="284" text-anchor="middle" fill="#0C447C">FunctionTransformer (features)</text>
  <text class="bs" x="450" y="304" text-anchor="middle" fill="#185FA5">calcule les 9 ratios métier — 658 → 667 colonnes</text>
  <text class="dim" x="690" y="291" text-anchor="start">667</text>
  <line x1="450" y1="318" x2="450" y2="339" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. ColumnTransformer container -->
  <rect x="60" y="340" width="780" height="252" rx="14" fill="#FAFAF7" stroke="#378ADD" stroke-width="1" stroke-dasharray="5 4"/>
  <text class="ct-h" x="80" y="366">ColumnTransformer (preprocessor) — 3 branches selon le type de colonne</text>

  <!-- branche binary -->
  <rect x="80" y="384" width="230" height="156" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text class="brt" x="195" y="408" text-anchor="middle" fill="#085041">binary — 21 colonnes</text>
  <text class="brl" x="195" y="436" text-anchor="middle" fill="#0F6E56">1. SimpleImputer</text>
  <text class="brl" x="195" y="453" text-anchor="middle" fill="#0F6E56">(most_frequent)</text>
  <text class="brl" x="195" y="481" text-anchor="middle" fill="#0F6E56">2. OrdinalEncoder</text>
  <text class="brr" x="195" y="520" text-anchor="middle" fill="#085041">→ 21 colonnes</text>

  <!-- branche ohe -->
  <rect x="335" y="384" width="230" height="156" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text class="brt" x="450" y="408" text-anchor="middle" fill="#633806">ohe — 11 colonnes</text>
  <text class="brl" x="450" y="436" text-anchor="middle" fill="#854F0B">1. SimpleImputer</text>
  <text class="brl" x="450" y="453" text-anchor="middle" fill="#854F0B">(most_frequent)</text>
  <text class="brl" x="450" y="481" text-anchor="middle" fill="#854F0B">2. OneHotEncoder</text>
  <text class="brr" x="450" y="520" text-anchor="middle" fill="#633806">→ 134 colonnes</text>

  <!-- branche num -->
  <rect x="590" y="384" width="230" height="156" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="brt" x="705" y="408" text-anchor="middle" fill="#2C2C2A">num — 635 colonnes</text>
  <text class="brl" x="705" y="436" text-anchor="middle" fill="#5F5E5A">passthrough</text>
  <text class="brl" x="705" y="453" text-anchor="middle" fill="#5F5E5A">(aucun traitement)</text>
  <text class="brl" x="705" y="481" text-anchor="middle" fill="#5F5E5A">NaN gérés par l'arbre</text>
  <text class="brr" x="705" y="520" text-anchor="middle" fill="#2C2C2A">→ 635 colonnes</text>

  <text class="ct-h" x="450" y="575" text-anchor="middle">Concaténation → 790 colonnes numériques</text>

  <line x1="450" y1="592" x2="450" y2="613" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. LGBMClassifier -->
  <rect x="230" y="614" width="440" height="64" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="bt" x="450" y="644" text-anchor="middle" fill="#0C447C">LGBMClassifier (model)</text>
  <text class="bs" x="450" y="664" text-anchor="middle" fill="#185FA5">790 colonnes → probabilité de défaut (~10 % du temps total)</text>
  <line x1="450" y1="678" x2="450" y2="699" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. Décision -->
  <rect x="230" y="700" width="440" height="64" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text class="bt" x="450" y="730" text-anchor="middle" fill="#633806">Décision — seuil métier 0,49</text>
  <text class="bs" x="450" y="750" text-anchor="middle" fill="#854F0B">proba ≥ 0,49 → « refusé »   ·   proba &lt; 0,49 → « accordé »</text>
  <line x1="450" y1="764" x2="450" y2="785" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. Sortie -->
  <rect x="230" y="786" width="440" height="58" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text class="bt" x="450" y="811" text-anchor="middle" fill="#2C2C2A">Sortie (JSON)</text>
  <text class="bs" x="450" y="830" text-anchor="middle" fill="#5F5E5A">{ proba_defaut, decision, seuil, model_version }</text>
</svg>
