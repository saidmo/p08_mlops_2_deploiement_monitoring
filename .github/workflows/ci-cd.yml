name: CI/CD — Credit Scoring API

# Déclenchement : à chaque push sur main (et sur les PR ciblant main)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 1) TESTS — exécute pytest avec le taux de couverture.
  #    Aucun service externe : les prédictions sont journalisées en JSON
  #    (JSON Lines) dans un fichier local, donc les tests tournent sans
  #    dépendance à une base de données.
  # ──────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v --cov=app --cov-report=term-missing

  # ──────────────────────────────────────────────────────────────────────
  # 2) BUILD — ne s'exécute que si les tests passent (needs: test).
  #    Construit l'image Docker pour garantir qu'elle est déployable.
  # ──────────────────────────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: credit-scoring-api:latest

      # ── Publication optionnelle vers GitHub Container Registry (GHCR) ──
      # Pour publier l'image, ajouter en haut du job :
      #     permissions:
      #       contents: read
      #       packages: write
      # puis décommenter les étapes ci-dessous.
